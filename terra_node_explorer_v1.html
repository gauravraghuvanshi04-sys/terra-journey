<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Terra — Journey Node Explorer v2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--surface:#ffffff;--surface2:#f0ede6;--surface3:#e5e1d8;
  --text:#1a1916;--text2:#5a5950;--text3:#9a9788;
  --border:#e0dcd4;--border2:#c8c3b8;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono','Fira Code',monospace;
  --L:#1e7a4e;--Lbg:#e8f5ed;--Lt:#0f3d27;
  --O:#5c3d92;--Obg:#f0eafb;--Ot:#2e1e4a;
  --A:#6b22b0;--Abg:#f2e8ff;--At:#3d1466;
  --S:#1250a0;--Sbg:#e5effc;--St:#08306a;
  --R:#a81818;--Rbg:#fde8e8;--Rt:#620e0e;
  --D:#3d5260;--Dbg:#eaeff2;--Dt:#1a2830;
  --W:#006666;--Wbg:#ddf5f5;--Wt:#003838;
  --IT:#b06000;--ITbg:#fff2df;--ITt:#5c3000;
  --radius:6px;--radius-lg:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141310;--surface:#1c1b18;--surface2:#232118;--surface3:#2a2925;
  --text:#e6e2d8;--text2:#8e8b82;--text3:#5a5850;
  --border:#2a2925;--border2:#3a3832;
  --Lbg:#0c1f12;--Lt:#5ecf8a;
  --Obg:#160e24;--Ot:#b39ade;
  --Abg:#170a2d;--At:#c99ef9;
  --Sbg:#081628;--St:#88b2f0;
  --Rbg:#250808;--Rt:#f07a7a;
  --Dbg:#0e1618;--Dt:#8ea8b4;
  --Wbg:#001a1a;--Wt:#40c4c4;
  --ITbg:#1e1200;--ITt:#f0a840;
}}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--surface);z-index:10}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:26px;height:26px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:13px;height:13px;fill:var(--bg)}
.logo-title{font-size:13px;font-weight:600;letter-spacing:-0.02em}
.logo-sub{font-size:10px;color:var(--text3);margin-left:3px}
.header-search{flex:1;max-width:320px;display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;height:30px}
.header-search input{background:none;border:none;outline:none;font-family:var(--font);font-size:12px;color:var(--text);width:100%}
.header-search input::placeholder{color:var(--text3)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-weight:500}

/* 3-panel */
.panels{display:grid;grid-template-columns:200px 1fr 400px;height:100%;overflow:hidden}

/* Left panel */
.left-panel{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:8px 0}
.journey-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 14px;border:none;background:none;cursor:pointer;text-align:left;font-family:var(--font);font-size:13px;color:var(--text2);border-radius:0;transition:background 0.1s}
.journey-btn:hover{background:var(--surface2)}
.journey-btn.active{background:var(--surface2);color:var(--text);font-weight:500}
.journey-btn.active .jdot{box-shadow:0 0 0 2px currentColor}
.jdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.jbtn-name{flex:1}
.jbtn-count{font-size:10px;background:var(--surface3);border-radius:20px;padding:1px 6px;color:var(--text3)}
.left-divider{height:1px;background:var(--border);margin:6px 14px}
.left-label{font-size:10px;color:var(--text3);padding:6px 14px 2px;letter-spacing:0.06em;text-transform:uppercase;font-weight:500}

/* Mid panel */
.mid-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.mid-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.mid-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-bottom:4px}
.mid-title{font-size:13px;font-weight:600;color:var(--text)}
.mid-meta{font-size:11px;color:var(--text3);margin-top:2px}
.mid-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}
.flow-scroll{flex:1;overflow-y:auto;padding:10px 12px}
.sub-section{margin-bottom:16px}
.sub-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;padding:0 4px;margin-bottom:6px}
.flow-chain{display:flex;flex-direction:column;gap:0}
.flow-item{display:flex;gap:8px;align-items:stretch}
.flow-connector{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0}
.conn-top{width:1px;height:10px;background:var(--border2)}
.conn-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);flex-shrink:0;transition:all 0.15s}
.conn-bot{flex:1;width:1px;background:var(--border2)}
.flow-item:first-child .conn-top{opacity:0}
.flow-item:last-child .conn-bot{opacity:0}
.node-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;cursor:pointer;margin-bottom:4px;transition:border-color 0.12s,box-shadow 0.12s}
.node-card:hover{border-color:var(--border2)}
.node-card.selected{border-width:1.5px;box-shadow:0 0 0 2px color-mix(in srgb,var(--jcolor) 15%,transparent)}
.node-id{font-size:9px;font-weight:600;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:2px}
.node-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.node-type-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.type-chip{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--surface2);color:var(--text3);font-weight:500}
.reentry-tag{font-size:9px;padding:1px 6px;border-radius:3px;background:#fff3e0;color:#9a5a0a;font-weight:500}
.it-tag{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--ITbg);color:var(--ITt);font-weight:500}
.node-preview{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.is-recovery>.node-card{background:color-mix(in srgb,#f59e0b 6%,var(--surface))}
.is-exit>.node-card{background:color-mix(in srgb,#64748b 4%,var(--surface))}

/* Right panel */
.right-panel{overflow-y:auto;background:var(--surface)}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);padding:24px}
.empty-state svg{opacity:0.3}
.empty-state p{font-size:12px;text-align:center;max-width:180px;line-height:1.5}
.schema-view{display:none;flex-direction:column;padding:0}
.schema-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.schema-journey-tag{font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
.schema-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px}
.schema-id{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px}
.schema-type-row{display:flex;gap:5px;flex-wrap:wrap}
.schema-chip{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);font-weight:500}

/* Schema section cards (A/B/C/D format from v2) */
.schema-body{padding:12px}
.schema-section-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.schema-section-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.schema-section-letter{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:var(--text);color:var(--surface);flex-shrink:0}
.schema-section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.schema-section-sub{font-size:9px;color:var(--text3);margin-left:auto}
.schema-section-body{padding:10px 12px}
.schema-row{display:flex;gap:0;border-bottom:1px solid var(--border);padding:7px 0}
.schema-row:last-child{border-bottom:none;padding-bottom:0}
.schema-label{font-size:10px;font-weight:500;width:120px;min-width:120px;color:var(--text3);flex-shrink:0;padding-top:1px;line-height:1.4}
.schema-val{font-size:11px;color:var(--text);line-height:1.6;flex:1}
.kpi-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);margin:2px 3px 2px 0}
.ts-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);font-family:var(--mono);border:1px solid var(--border);margin:2px 3px 2px 0}
.flag-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);font-family:var(--mono);border:1px solid var(--border);margin:2px 3px 2px 0}
.conn-box{background:var(--surface2);border-radius:var(--radius);padding:7px 10px;font-size:11px;margin:3px 0}
.conn-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px}
.loop-box{background:color-mix(in srgb,#f59e0b 10%,var(--surface2));border:1px solid color-mix(in srgb,#f59e0b 30%,transparent);border-radius:var(--radius);padding:7px 10px;font-size:11px;color:var(--text);line-height:1.5}
.gap-box{background:color-mix(in srgb,#3b82f6 6%,var(--surface2));border:1px solid color-mix(in srgb,#3b82f6 20%,transparent);border-radius:var(--radius);padding:7px 10px;font-size:11px;color:var(--text);line-height:1.5}
.no-loop{font-size:11px;color:var(--text3);font-style:italic}

/* Search results overlay */
.search-results{position:absolute;top:52px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:50;max-height:360px;overflow-y:auto;display:none}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;border-bottom:1px solid var(--border)}
.sr-item:hover{background:var(--surface2)}
.sr-item:last-child{border-bottom:none}
.sr-jdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sr-id{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;width:130px}
.sr-name{font-size:12px;font-weight:500;color:var(--text)}
.sr-desc{font-size:10px;color:var(--text3);flex:1;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

@media(max-width:900px){.panels{grid-template-columns:180px 1fr 340px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14"><path d="M2 2h4v4H2zM8 2h4v4H8zM2 8h4v4H2zM8 8l3 3M11 8l-3 3"/></svg>
      </div>
      <span class="logo-title">Terra</span>
      <span class="logo-sub">Node Explorer</span>
    </div>
    <div class="header-search">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4"/><path d="M9 9l3 3"/></svg>
      <input id="search-input" type="text" placeholder="Search nodes, KPIs, flags…" oninput="handleSearch(this.value)" onfocus="showSearchResults()" onblur="hideSearchResults()"/>
    </div>
    <div class="header-right">
      <span class="hbadge">v2.0 · April 2026</span>
      <span class="hbadge">8 journeys · 29 nodes</span>
    </div>
  </div>
  <div style="position:relative;display:contents">
    <div id="search-results" class="search-results"></div>
    <div class="panels">
      <div class="left-panel">
        <div class="left-label">Core Journeys</div>
        <div id="journey-list"></div>
        <div class="left-divider"></div>
        <div class="left-label">Parallel Layers</div>
        <div id="layer-list"></div>
      </div>
      <div class="mid-panel">
        <div class="mid-header">
          <div id="mid-badge" class="mid-badge"></div>
          <div id="mid-title" class="mid-title"></div>
          <div id="mid-meta" class="mid-meta"></div>
          <div id="mid-desc" class="mid-desc"></div>
        </div>
        <div id="flow-scroll" class="flow-scroll"></div>
      </div>
      <div class="right-panel">
        <div id="empty-state" class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
          <p>Select a node from the flow to view its full v2 schema card</p>
        </div>
        <div id="schema-view" class="schema-view"></div>
      </div>
    </div>
  </div>
</div>
<script>
const J={
  L:{id:"L",name:"Lead-to-Opp",abbrev:"L1–L4",color:"#1e7a4e",bg:"#e8f5ed",tc:"#0f3d27",desc:"Lead creation through opportunity creation",isCore:true},
  O:{id:"O",name:"Opportunity",abbrev:"O1–O5",color:"#5c3d92",bg:"#f0eafb",tc:"#2e1e4a",desc:"Pipeline from opp to Closed Won",isCore:true},
  A:{id:"A",name:"Appointment",abbrev:"A1–A5",color:"#6b22b0",bg:"#f2e8ff",tc:"#3d1466",desc:"Booking through sit/held outcome",isCore:true},
  S:{id:"S",name:"Sales",abbrev:"S1–S2",color:"#1250a0",bg:"#e5effc",tc:"#08306a",desc:"Sale event through confirmation",isCore:true},
  R:{id:"R",name:"Retention",abbrev:"R1–R3",color:"#a81818",bg:"#fde8e8",tc:"#620e0e",desc:"At-risk recovery and realization",isCore:true},
  D:{id:"D",name:"Dialer",abbrev:"D1–D3",color:"#3d5260",bg:"#eaeff2",tc:"#1a2830",desc:"Parallel execution layer — all journeys",isCore:false},
  W:{id:"W",name:"WFM Layer",abbrev:"W1–W2",color:"#006666",bg:"#ddf5f5",tc:"#003838",desc:"Parallel capacity & effort layer",isCore:false},
  IT:{id:"IT",name:"Interaction Txn",abbrev:"IT",color:"#b06000",bg:"#fff2df",tc:"#5c3000",desc:"Atomic record of every call, text, chat, email",isCore:false},
};

const NODES=[
  // LEAD JOURNEY
  {id:"L1.ENTRY",j:"L",name:"Lead Created / Loaded",sub:"L1",type:"Entry",
   desc:"Cohort anchor for all downstream analysis. Every velocity metric — speed-to-lead, time-to-contact, lead-to-opp days — is measured from this point. A lead can originate from marketing acquisition, web form, inbound call, purchased list, reactivated customer, batch load, or system automation.",
   bizAliases:"'Contact', 'Prospect', 'Record', 'Client File', 'Enrollment Lead'",
   entity:"Lead record · lead_id or contact_id",
   sot:"CRM (Salesforce, VICIDIAL, HubSpot, custom)",
   kpis:["# Leads Created","Dialer-Eligible Rate","Lead-to-Dialer Lag","Duplicate Rate","Lead Volume by Source Mix (%)"],
   ts:["lead_created_date","dialer_load_date","marketing_drop_date","web_submission_date"],
   flags:["invalid_phone_flag","batch_lead_flag","dialer_eligible_flag","hold_out_flag","control_flag"],
   reloopWhen:"Reactivated customers re-enter from Retention RP campaigns. Recycled leads from exhausted dialer campaigns re-enter if a new CRM lead is created.",
   reloopFrom:"R3.EXIT (reactivation) · D3.ENTRY (recycle campaign)",
   tierRequired:["lead_created_date","lead_id","lead_source","dialer_eligible_flag"],
   tierImportant:["dialer_load_date","invalid_phone_flag","batch_lead_flag"],
   tierEnriching:["hold_out_flag","control_flag","lead_score"],
   up:"Marketing Journey",dn:"L1.MID.QUALIFIED → L2.ENTRY | L1.EXIT.EXCLUDED | L1.EXIT.HOLD",
   gap:"Is the lead creation timestamp consistent across all sources? Are there leads in the dialer without CRM records? Are duplicates detected before or after creation?"},
  {id:"L1.MID.QUALIFIED",j:"L",name:"Sales Qualification Checkpoint",sub:"L1",type:"Mid-Point",
   desc:"The point where the business determines whether the lead is in active sales scope. Separates leads that will be actively pursued from those that won't. Critical for calculating in-scope conversion rates.",
   bizAliases:"'In-Scope', 'Dialable', 'Eligible', 'Approved for Working'",
   entity:"Lead record · same key as L1.ENTRY",
   sot:"CRM qualification logic or dialer sync flag",
   kpis:["Sales Qualification Rate","Exclusion Rate by Reason","Time-to-Qualification","Requalification Rate"],
   ts:["qualification_date","dialer_sync_date"],
   flags:["dialer_eligible_flag","qualification_status","dialer_vs_non_dialer"],
   reloopWhen:"Leads in nurture/hold can re-qualify when conditions change (batch trigger, deadline approaching, score update).",
   reloopFrom:"L1.EXIT.HOLD (re-qualifying leads)",
   tierRequired:["qualification_date","dialer_eligible_flag"],
   tierImportant:["qualification_status","dialer_vs_non_dialer"],
   tierEnriching:["re_qualification_count"],
   up:"L1.ENTRY",dn:"L2.ENTRY | L1.EXIT.EXCLUDED | L1.EXIT.HOLD",
   gap:"Is qualification happening explicitly (status field change) or implicitly (loaded into dialer = qualified)? Are there leads stuck indefinitely in a pre-qualification state?"},
  {id:"L1.EXIT.EXCLUDED",j:"L",name:"Lead Excluded / Out of Scope",sub:"L1",type:"Exit",
   desc:"The lead does not meaningfully enter the sales lifecycle — duplicate, invalid data, non-serviceable geography, compliance failure, or wrong segment. A real journey branch that should be tracked as a quality signal.",
   bizAliases:"'Ineligible', 'Invalid', 'DQ'd', 'Suppressed'",
   entity:"Lead record",sot:"CRM exclusion flags",
   kpis:["# Excluded Leads","Exclusion Rate (%)","Exclusion by Reason Distribution","Invalid Contact Rate"],
   ts:["exclusion_date"],
   flags:["invalid_phone_flag","non_dialable_flag","control_flag"],
   reloopWhen:"Some exclusions can be reversed (data corrected, geography expanded) → re-enter at L1.MID.QUALIFIED.",
   reloopFrom:"None — terminal unless corrected",
   tierRequired:["exclusion_date","exclusion_reason"],
   tierImportant:["invalid_phone_flag","non_dialable_flag"],
   tierEnriching:["control_flag"],
   up:"L1.MID.QUALIFIED",dn:"End state (reversible → L1.MID.QUALIFIED)",
   gap:"Are excluded leads removed from reporting denominators? Are control/test leads correctly separated from true exclusions?"},
  {id:"L1.EXIT.HOLD",j:"L",name:"Lead in Nurture / Hold",sub:"L1",type:"Exit",
   desc:"The lead exists but is not ready for active sales work. Awaiting enrichment, held for timing, or in an automated nurture sequence. Distinct from exclusion — hold leads are expected to eventually become sales-eligible.",
   bizAliases:"'Pending', 'Nurture', 'Future', 'Scheduled Callback', 'Waitlist'",
   entity:"Lead record",sot:"CRM hold status or callback queue",
   kpis:["# Leads in Hold","Hold Duration","Hold-to-Active Conversion Rate","Hold Aging Distribution"],
   ts:["hold_entry_date","scheduled_callback_date"],
   flags:["hold_out_flag","scheduled_callback_flag"],
   reloopWhen:"Batch triggers, deadline dates, or score changes move hold leads back to qualified.",
   reloopFrom:"External trigger (schedule, batch)",
   tierRequired:["hold_entry_date","hold_reason"],
   tierImportant:["scheduled_callback_date","hold_out_flag"],
   tierEnriching:["hold_expiry_date"],
   up:"L1.MID.QUALIFIED",dn:"L1.MID.QUALIFIED (re-qualifies) | L1.EXIT.EXCLUDED (expires)",
   gap:"Are hold leads included in lead-created counts but excluded from in-scope conversion denominators? Is there a maximum hold duration?"},
  {id:"L2.ENTRY",j:"L",name:"Working Path Selection",sub:"L2",type:"Entry",
   desc:"Sales-qualified lead routed to dialer, assigned rep, direct mid-funnel, or delayed queue. This branching point determines the entire downstream execution model.",
   bizAliases:"'Routing', 'Assignment', 'Allocation', 'Queue Entry'",
   entity:"Lead record",sot:"CRM routing logic or dialer load event",
   kpis:["Working Path Distribution (%)","Routing Lag","Zero-Attempt Rate","Path Change Rate"],
   ts:["routing_decision_date","dialer_load_date","hopper_entry_date"],
   flags:["dialer_eligible_flag","dialer_vs_non_dialer","zero_attempt_flag"],
   reloopWhen:"Assigned leads not progressing can be re-routed to dialer path. Dialer leads with signals can be pulled to assigned rep.",
   reloopFrom:"L2.EXIT.ASSIGNED (escalated to dialer)",
   tierRequired:["routing_decision_date","working_path_type"],
   tierImportant:["dialer_load_date","zero_attempt_flag"],
   tierEnriching:["hopper_entry_date","path_change_flag"],
   up:"L1.MID.QUALIFIED",dn:"L2.EXIT.DIALER | L2.EXIT.ASSIGNED",
   gap:"Is the routing decision recorded explicitly or inferred from which system the lead appears in? Are there qualified leads that never appear in any working path?"},
  {id:"L2.EXIT.DIALER",j:"L",name:"Routed to Dialer Path",sub:"L2",type:"Exit",
   desc:"Lead marked dialer-eligible and queued for outbound working. Loaded into the dialer system and worked through a structured contact strategy with defined attempt caps, recycle intervals, and disposition rules.",
   bizAliases:"'Dialer Queue', 'Hopper', 'Auto-Dial List'",

let selJ="L", selN=null;

function buildLeft(){
  const cores=Object.values(J).filter(j=>j.isCore);
  const layers=Object.values(J).filter(j=>!j.isCore);
  document.getElementById("journey-list").innerHTML=cores.map(j=>`
    <button class="journey-btn ${selJ===j.id?"active":""}" onclick="selectJourney('${j.id}')">
      <span class="jdot" style="background:${j.color}${selJ===j.id?";box-shadow:0 0 0 2px "+j.color:""}"></span>
      <span class="jbtn-name">${j.name}</span>
      <span class="jbtn-count">${NODES.filter(n=>n.j===j.id).length}</span>
    </button>`).join("");
  document.getElementById("layer-list").innerHTML=layers.map(j=>`
    <button class="journey-btn ${selJ===j.id?"active":""}" onclick="selectJourney('${j.id}')">
      <span class="jdot" style="background:${j.color}${selJ===j.id?";box-shadow:0 0 0 2px "+j.color:""}"></span>
      <span class="jbtn-name">${j.name}</span>
      <span class="jbtn-count">${NODES.filter(n=>n.j===j.id).length}</span>
    </button>`).join("");
}

function buildMid(){
  const j=J[selJ];
  const badge=document.getElementById("mid-badge");
  badge.innerHTML=`<span class="jdot" style="background:${j.color};width:6px;height:6px;margin-right:3px"></span>${j.name} · ${j.abbrev}`;
  badge.style.background=j.bg; badge.style.color=j.tc;
  document.getElementById("mid-title").textContent=j.name+" Journey";
  const cnt=NODES.filter(n=>n.j===selJ).length;
  document.getElementById("mid-meta").textContent=`${cnt} node${cnt!==1?"s":""}`;
  document.getElementById("mid-desc").textContent=j.desc;
  const scroll=document.getElementById("flow-scroll");
  const subs=JOURNEY_SUBSECTIONS[selJ]||[];
  scroll.innerHTML=subs.map(sub=>{
    const nodeIds=SUBSECTION_MAP[sub.key]||[];
    const nodes=nodeIds.map(id=>NODES.find(n=>n.id===id)).filter(Boolean);
    return `<div class="sub-section">
      <div class="sub-label">${sub.label}</div>
      <div class="flow-chain" style="--jcolor:${j.color}">
        ${nodes.map(n=>`
          <div class="flow-item ${RECOVERY_NODES.has(n.id)?"is-recovery":""} ${EXIT_NODES.has(n.id)?"is-exit":""}">
            <div class="flow-connector">
              <div class="conn-top"></div>
              <div class="conn-dot" style="${selN&&selN.id===n.id?`border-color:${j.color};background:${j.color}`:""}"></div>
              <div class="conn-bot"></div>
            </div>
            <div class="node-card ${selN&&selN.id===n.id?"selected":""}" 
                 style="${selN&&selN.id===n.id?`--jcolor:${j.color};--jbg:${j.bg}`:""}"
                 onclick="selectNode('${n.id}')">
              <div class="node-id" style="color:${j.color}">${n.id}</div>
              <div class="node-name">${n.name}</div>
              <div class="node-type-row">
                <span class="type-chip">${n.type}</span>
                <span class="type-chip">${n.sub}</span>
                ${RECOVERY_NODES.has(n.id)?'<span class="reentry-tag">↺ recovery</span>':""}
                ${n.j==="IT"?'<span class="it-tag">⊗ atomic</span>':""}
              </div>
              <div class="node-preview">${n.desc}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

          <div class="schema-row" style="border-bottom:none">
            <div class="schema-label">Re-Loop Paths</div>
            <div class="schema-val">
              ${node.reloopWhen?`<div class="loop-box" style="margin-bottom:6px">↺ ${node.reloopWhen}</div>`:'<span style="font-size:11px;color:var(--text3);font-style:italic">No direct re-loops from this node.</span>'}
              ${node.reloopFrom?`<div style="font-size:10px;color:var(--text3);margin-top:4px">Entry source: ${node.reloopFrom}</div>`:""}
            </div>
          </div>
        </div>
      </div>

      <!-- C: Semantic Layer -->
      <div class="schema-section-card">
        <div class="schema-section-header">
          <div class="schema-section-letter">C</div>
          <div class="schema-section-title">Semantic Layer</div>
          <div class="schema-section-sub">KPIs · timestamps · flags</div>
        </div>
        <div class="schema-section-body">
          <div class="schema-row">
            <div class="schema-label">KPIs &amp; Measures</div>
            <div class="schema-val">${node.kpis.map(k=>`<span class="kpi-tag">${k}</span>`).join("")}</div>
          </div>
          <div class="schema-row">
            <div class="schema-label">Key Timestamps</div>
            <div class="schema-val">${node.ts.map(t=>`<span class="ts-tag">${t}</span>`).join("")}</div>
          </div>
          <div class="schema-row" style="border-bottom:none">
            <div class="schema-label">Flags &amp; Indicators</div>
            <div class="schema-val">${node.flags.map(f=>`<span class="flag-tag">${f}</span>`).join("")}</div>
          </div>
        </div>
      </div>

      <!-- D: Onboarding Readiness -->
      <div class="schema-section-card">
        <div class="schema-section-header">
          <div class="schema-section-letter">D</div>
          <div class="schema-section-title">Onboarding Readiness</div>
          <div class="schema-section-sub">Priority tiers & gap questions</div>
        </div>
        <div class="schema-section-body">
          <div class="schema-row">
            <div class="schema-label">Field Priorities</div>
            <div class="schema-val">
              ${tier("🔴 Required — blocks go-live",node.tierRequired||[])}
              ${tier("🟡 Important — enriches analysis",node.tierImportant||[])}
              ${tier("🟢 Enriching — nice to have",node.tierEnriching||[])}
            </div>
          </div>
          <div class="schema-row" style="border-bottom:none">
            <div class="schema-label">Gap Questions</div>
            <div class="schema-val"><div class="gap-box">${node.gap}</div></div>
          </div>
        </div>
      </div>
    </div>`;
}

window.selectJourney=function(id){
  selJ=id;selN=null;
  buildLeft();buildMid();buildRight(null);
};
window.selectNode=function(id){
  const n=NODES.find(x=>x.id===id);
  if(!n) return;
  if(n.j!==selJ){selJ=n.j;buildLeft();}
  selN=n;buildMid();buildRight(n);
  setTimeout(()=>{const el=document.querySelector(".node-card.selected");if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});},50);
};

// Search
let searchTimeout;
window.handleSearch=function(q){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{
    const el=document.getElementById("search-results");
    if(!q.trim()){el.style.display="none";return;}
    const qLow=q.toLowerCase();
    const results=NODES.filter(n=>
      n.id.toLowerCase().includes(qLow)||
      n.name.toLowerCase().includes(qLow)||
      n.desc.toLowerCase().includes(qLow)||
      n.kpis.some(k=>k.toLowerCase().includes(qLow))||
      n.flags.some(f=>f.toLowerCase().includes(qLow))||
      n.ts.some(t=>t.toLowerCase().includes(qLow))||
      (n.bizAliases&&n.bizAliases.toLowerCase().includes(qLow))
    ).slice(0,12);
    if(!results.length){el.style.display="none";return;}
    el.innerHTML=results.map(n=>`
      <div class="sr-item" onmousedown="selectNode('${n.id}');document.getElementById('search-input').value='';document.getElementById('search-results').style.display='none'">
        <span class="sr-jdot" style="background:${J[n.j].color}"></span>
        <span class="sr-id">${n.id}</span>
        <span class="sr-name">${n.name}</span>
        <span class="sr-desc">${n.desc}</span>
      </div>`).join("");
    el.style.display="block";
  },80);
};
window.showSearchResults=function(){
  if(document.getElementById("search-input").value.trim())
    document.getElementById("search-results").style.display="block";
};
window.hideSearchResults=function(){
  setTimeout(()=>{document.getElementById("search-results").style.display="none";},150);
};

buildLeft();buildMid();buildRight(null);
</script>
</body>
</html>
